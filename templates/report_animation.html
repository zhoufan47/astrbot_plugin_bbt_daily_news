<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta name="viewport" content="width=550,height=900">
    <meta charset="UTF-8">
    <title>今日放送动画</title>
    <style>
        body { font-family: 'Source Han Sans', sans-serif; background-color: #f0f2f5; padding: 20px; width: 600px; }
        .container { background: white; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); overflow: hidden; }
        .header { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; padding: 20px; text-align: center; }
        .header h1 { margin: 0; font-size: 24px; }
        .header p { margin: 5px 0 0; opacity: 0.8; font-size: 14px; }
        .section { padding: 15px 20px; border-bottom: 1px solid #eee; }
        .section-title { font-weight: bold; color: #333; margin-bottom: 10px; display: flex; align-items: center; }
        .section-title::before { content: ''; display: inline-block; width: 4px; height: 16px; background: #764ba2; margin-right: 8px; border-radius: 2px; }
        .anime-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
            margin-top: 10px;
        }
        .anime-cover-box {
            width: 100%;
            aspect-ratio: 2 / 3;
            background-color: #eee;
            position: relative;
            overflow: hidden;
        }
        .anime-cover-box img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            object-position: center top;
            display: block;
        }
        .anime-card {
            background: #fff;
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
            display: flex;
            flex-direction: column;
            text-align: center;
            height: 100%;
        }
        .anime-title {
            padding: 8px;
            font-size: 12px;
            color: #333;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
            text-overflow: ellipsis;
            line-height: 1.4;
        }
        .footer { text-align: center; padding: 10px; color: #999; font-size: 12px; background: #fafafa; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>今日放送动画</h1>
            <p>{{ date }}</p>
        </div>
        <div class="section">
            <div class="section-title">今日放送动画</div>
            {% if not bangumi_list %}
                <p style="color:#999; font-size:12px;">今日无更新或获取失败</p>
            {% else %}
                <div class="anime-grid">
                    {% for anime in bangumi_list %}
                    <div class="anime-card">
                        <div class="anime-cover-box">
                            <img src="{{ anime.cover }}" onerror="this.src='https://bgm.tv/img/no_icon_subject.png'">
                        </div>
                        <div class="anime-title">{{ anime.title }}</div>
                    </div>
                    {% endfor %}
                </div>
            {% endif %}
        </div>
        <div class="footer">
            Developed by <b>棒棒糖</b> <br>
            Powered by <b>AstrBot</b> <br>
            Data Scraped From <b>番组计划</b>
        </div>
    </div>
</body>
</html>
